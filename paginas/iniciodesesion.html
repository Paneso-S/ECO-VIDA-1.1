<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia sesión</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #cde6cd;">

    <!-- encabezado -->
    <header class="text-center mt-3">
        <h1 style="color: #1b5e20;">Iniciar sesión</h1>
    </header>

    <!-- menú simple -->
    <nav class="text-center mt-2">
        <a href="../index.html" class="me-3">inicio</a>
        <a href="../paginas/contactos.html" class="me-3">contactos</a>
        <a href="../paginas/registrarse.html">Registrate</a>
    </nav>

    <!-- formulario -->
    <section class="container mt-4" style="max-width: 400px;">

        <form class="p-3" style="background-color: white; border-radius: 8px;">

            <label class="form-label">Correo electronico</label>
            <input type="email" class="form-control" placeholder="Correo">

            

            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" placeholder="Contraseña">

            

            <a href="olvidosucontraseña.html" style="font-size: 14px;">Olvidó su contraseña</a>

            

            <button class="btn w-100" style="background-color: #2e7d32; color: white;">
                Iniciar sesión
            </button>

        </form>

    </section>

</body>
</html>
