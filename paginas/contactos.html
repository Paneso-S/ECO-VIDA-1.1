<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../style/contactos.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg">

    <div class="container">

      <a class="navbar-brand" href="../index.html">
        Eco-Vida
      </a>

      <button class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#menu">

        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item ms-3">
            <a class="nav-link" href="../paginas/iniciodesesion.html">
              Inicio de sesión
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <div class="container mt-5">

    <div class="titulo-container">
      <h1 class="titulo">Contactos</h1>
    </div>

    <div class="contacto-contenedor">

      <div class="card equipo-card">

        <h4>Equipo de trabajo</h4>

        <ul>

          <li>
            samuel.arangopa@ierepublicadehonduras.edu.co
          </li>

          <li>
            diegoalejandro.lopezva@ierepublicadehonduras.edu.co
          </li>

          <li>
            josedavid.madridzu@ierepublicadehonduras.edu.co
          </li>

          <li>
            juanjose.ramirezar@ierepublicadehonduras.edu.co
          </li>

        </ul>

      </div>

      <div class="card form-card">

        <h4>Enviar mensaje</h4>

        <form>

          <div class="mb-4">

            <label class="form-label">
              Nombre
            </label>

            <input
              type="text"
              class="form-control"
              placeholder="Ingrese su nombre">

          </div>

          <div class="mb-4">

            <label class="form-label">
              Correo
            </label>

            <input
              type="email"
              class="form-control"
              placeholder="Ingrese su correo">

          </div>

          <div class="mb-4">

            <label class="form-label">
              Mensaje
            </label>

            <textarea
              class="form-control"
              rows="6"
              placeholder="Escriba su mensaje"></textarea>

          </div>

          <button class="btn btn-primary w-100">
            enviar
          </button>

        </form>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
