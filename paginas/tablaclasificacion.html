<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ECO-VIDA</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../style/tablaclasificacion.css">

</head>

<body class="d-flex flex-column min-vh-100">

  <!-- menú -->
  <nav class="navbar navbar-expand-lg">

    <div class="container justify-content-center">

      <a class="btn btn-success mx-2" href="index.html">
        Inicio
      </a>

      <a class="btn btn-success mx-2" href="contactos.html">
        Contactos
      </a>

      <a class="btn btn-success mx-2" href="conocenos.html">
        Conócenos
      </a>

    </div>

  </nav>

  <!-- título -->
  <div class="titulo">

    <h1>♻ Ranking de Reciclaje</h1>

    <p>
      Tabla editable para registrar materiales reciclados y participantes.
    </p>

  </div>

  <!-- tabla -->
  <div class="tabla-container flex-fill">

    <table class="table align-middle">

      <thead>

        <tr>
          <th>Puesto</th>
          <th>Nombre</th>
          <th>Material</th>
          <th>Kilos</th>
          <th>Hora</th>
          <th>Acción</th>
        </tr>

      </thead>

      <tbody id="tabla-body">

        <tr>

          <td>
            <input type="text" value="1">
          </td>

          <td>
            <input type="text" value="Juan José">
          </td>

          <td>
            <select>
              <option>Plástico</option>
              <option>Papel</option>
              <option>Cartón</option>
            </select>
          </td>

          <td>
            <input type="text" value="120 kg">
          </td>

          <td>
            <input type="time">
          </td>

          <td>
            <button class="btn-eliminar" onclick="eliminarFila(this)">
              Eliminar
            </button>
          </td>

        </tr>

      </tbody>

    </table>

    <!-- botón agregar -->
    <div class="text-center">

      <button class="btn-agregar" onclick="agregarFila()">
        + Agregar Participante
      </button>

    </div>

  </div>

  <!-- footer -->
  <div class="footer">

    © 2026 ECO-VIDA | Sistema editable de reciclaje 🌎

  </div>

  <!-- JavaScript -->
  <script>

    function agregarFila() {

      let tabla = document.getElementById("tabla-body");

      let nuevaFila = document.createElement("tr");

      nuevaFila.innerHTML = `

        <td>
          <input type="text" placeholder="#">
        </td>

        <td>
          <input type="text" placeholder="Nombre">
        </td>

        <td>
          <select>
            <option>Plástico</option>
            <option>Papel</option>
            <option>Cartón</option>
          </select>
        </td>

        <td>
          <input type="text" placeholder="0 kg">
        </td>

        <td>
          <input type="time">
        </td>

        <td>
          <button class="btn-eliminar" onclick="eliminarFila(this)">
            Eliminar
          </button>
        </td>

      `;

      tabla.appendChild(nuevaFila);
    }

    function eliminarFila(boton) {
      boton.parentElement.parentElement.remove();
    }

  </script>

</body>

</html>
