<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/olvidosucontraseña.css">
    <title>Olvidaste tu contraseña</title>
</head>
<body id="forma">

    <nav class="navbar navbar-expand-lg barra-superior">
        <div class="container-fluid header-content">
            <span class="marca">Eco-Vida</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="contactos.html" class="nav-link nav-link-custom">Contactos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="titulo-destacado">
            <h1>Olvidaste tu contraseña</h1>
        </div>

        <form action="#" method="post">
            <section class="form-content">
                <h2>Introduce tu correo electrónico</h2>

                <div class="campo-formulario">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Correo" required>
                </div>

                <button type="submit" class="btn-recuperar">
                    Recuperar
                </button>
            </section>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
